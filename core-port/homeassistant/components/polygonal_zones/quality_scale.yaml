# Tracks the implementation status of every Home Assistant integration
# quality-scale rule for this integration. NOT a panel-certified statement of
# tier — the manifest's quality_scale field is set to "bronze" because higher
# tiers can only be claimed after review by the HA architecture team (which
# happens through the core-integration submission process, not by
# self-declaration). This file documents the work done in case a future
# submission goes ahead.

rules:
  # --------- Bronze ---------
  action-setup: done
  appropriate-polling:
    status: exempt
    comment: Push-based; reacts to source device_tracker state_changed events.
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name:
    status: exempt
    comment: Entity name is generated from the source device_tracker entity_id.
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # --------- Silver ---------
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Integration uses no authentication.
  test-coverage: done

  # --------- Gold ---------
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Zone files are user-supplied URLs/paths; no network discovery is possible.
  discovery-update-info:
    status: exempt
    comment: No discovery.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: Operates on any HA device_tracker entity exposing latitude / longitude / gps_accuracy.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Single synthetic DeviceEntryType.SERVICE device per config entry; nothing dynamic to add post-setup.
  entity-category:
    status: exempt
    comment: TrackerEntity has no entity_category by convention.
  entity-device-class:
    status: exempt
    comment: TrackerEntity has no device_class.
  entity-disabled-by-default:
    status: exempt
    comment: All entities are enabled by default; user explicitly selected them in config flow.
  entity-translations:
    status: exempt
    comment: Entity name is derived from the source device_tracker; no static name to translate.
  exception-translations: done
  icon-translations:
    status: exempt
    comment: TrackerEntity has no icon; icon comes from HA's device_tracker frontend.
  reconfiguration-flow: done
  repair-issues: done
  stale-devices:
    status: exempt
    comment: No dynamic devices.

  # --------- Platinum ---------
  async-dependency: done
  inject-websession:
    status: exempt
    comment: |
      Uses a per-call aiohttp.ClientSession bound to a custom DNS resolver
      (_PublicOnlyResolver) that re-applies the private/loopback/metadata IP
      filter inside aiohttp's connect path. Sharing HA's session would either
      strip this SSRF defence or impose our resolver on every other integration's
      HTTP traffic, which is not acceptable.
  strict-typing: done
