name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Attach integration zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify Validate workflow succeeded on this SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          STATUS=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/validate.yml/runs?head_sha=$GITHUB_SHA" \
            --jq '.workflow_runs | map(select(.conclusion == "success")) | length')
          if [ "$STATUS" -eq 0 ]; then
            echo "::error::Validate workflow has not completed successfully on $GITHUB_SHA. Refusing to release."
            exit 1
          fi

      - name: Verify manifest version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(jq -r .version custom_components/polygonal_zones/manifest.json)
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version $TAG_VERSION does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Create integration zip
        run: |
          cd custom_components/polygonal_zones
          zip -r "$GITHUB_WORKSPACE/polygonal_zones.zip" .

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: polygonal_zones.zip
