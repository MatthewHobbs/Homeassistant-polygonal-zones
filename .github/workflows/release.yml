name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Attach integration zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      # Required for actions/attest-build-provenance to mint a Sigstore
      # bundle signed with the repo's OIDC identity — lets installers
      # verify the uploaded zip came from this exact workflow run without
      # needing a long-lived GPG key.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify Validate workflow succeeded on this SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eo pipefail
          STATUS=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/validate.yml/runs?head_sha=$GITHUB_SHA" \
            --jq '.workflow_runs | map(select(.conclusion == "success")) | length')
          if [ "$STATUS" -eq 0 ]; then
            echo "::error::Validate workflow has not completed successfully on $GITHUB_SHA. Refusing to release."
            exit 1
          fi

      - name: Verify manifest version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(jq -r .version custom_components/polygonal_zones/manifest.json)
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version $TAG_VERSION does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Create integration zip
        run: |
          cd custom_components/polygonal_zones
          zip -r "$GITHUB_WORKSPACE/polygonal_zones.zip" .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: polygonal_zones.zip

      - name: Upload zip to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: polygonal_zones.zip
