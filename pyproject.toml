[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-p no:homeassistant -ra"
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
  "E",     # pycodestyle errors
  "W",     # pycodestyle warnings
  "F",     # pyflakes
  "I",     # isort
  "UP",    # pyupgrade
  "B",     # flake8-bugbear
  "SIM",   # flake8-simplify
  "ASYNC", # flake8-async
  "RUF",   # ruff-specific
]
ignore = [
  "E501",  # line length handled by formatter
  "B008",  # function call in default argument (common HA pattern)
]

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["custom_components.polygonal_zones"]

[tool.ruff.format]
quote-style = "double"
